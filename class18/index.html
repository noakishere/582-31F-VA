<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Template Demo</h1>

    <!-- Template is present in the HTML file, but the user won't see it -->
    <!-- Template content is inactive until cloned. -->
    <template id="message-template">
      <div class="message-box">
        <h2>Template Title</h2>
        <p>This content comes from a template</p>
      </div>
    </template>

    <!-- why don't we just use this? -->
    <!-- Hidden HTML is still live in the page DOM -->
    <div id="my-div" style="display: none">DIV</div>

    <div id="output"></div>

    <script src="script.js"></script>
  </body>
</html>
